<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --ink: #1b1b1b;
        --muted: #565c65;
        --line: #dfe1e2;
        --blue: #005ea8;
        --green: #2e7044;
        --bg: #f7f9fa;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        overflow: hidden;
      }

      body {
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 18px;
      }

      .phones {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(2, minmax(230px, 1fr));
        margin: 0 auto;
        max-width: 720px;
      }

      .phone {
        background: #111;
        border-radius: 34px;
        margin: 0 auto;
        max-width: 330px;
        padding: 12px;
        width: 100%;
      }

      .screen {
        background: #fff;
        border-radius: 24px;
        min-height: 560px;
        overflow: hidden;
      }

      .phonebar {
        align-items: center;
        background: #f7f9fa;
        display: flex;
        font-size: 12px;
        font-weight: 700;
        justify-content: space-between;
        padding: 10px 18px 8px;
      }

      .notice {
        background: #ecf3ec;
        border-bottom: 1px solid #b4d0b9;
        padding: 18px;
      }

      .notice.error {
        background: #f8dfe2;
        border-bottom-color: #f2938c;
      }

      .notice strong {
        color: var(--green);
        display: block;
        font-size: 20px;
        margin-bottom: 6px;
      }

      .notice.error strong {
        color: #b50909;
      }

      .notice span,
      .row span {
        color: var(--muted);
      }

      .body {
        padding: 18px;
      }

      .row {
        border-bottom: 1px solid var(--line);
        display: grid;
        gap: 8px;
        grid-template-columns: 112px minmax(0, 1fr);
        padding: 11px 0;
      }

      .row span {
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      .value {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        overflow-wrap: anywhere;
      }

      .actions {
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr 1fr;
        margin-top: 16px;
      }

      .actions--single {
        grid-template-columns: 1fr;
      }

      .button {
        border: 1px solid var(--blue);
        color: var(--blue);
        font-weight: 700;
        padding: 10px;
        text-align: center;
      }

      .button.primary {
        background: var(--blue);
        color: #fff;
      }

      @media (max-width: 620px) {
        .phones {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="phones">
      <div class="phone" aria-label="スマートフォン上のコンパニオンアプリ登録完了画面">
        <div class="screen">
          <div class="phonebar"><span>9:41</span><span>5G 100%</span></div>
          <div class="notice">
            <strong>登録完了</strong>
            <span>この端末はAPK配信サーバーに登録されました。</span>
          </div>
          <div class="body">
            <div class="row"><span>表示名</span><b>Pixel 8 QA-01</b></div>
            <div class="row"><span>通知</span><b>受信できます</b></div>
            <div class="row"><span>登録日時</span><b>2026-05-19 09:41</b></div>
            <div class="actions actions--single">
              <div class="button primary">閉じる</div>
            </div>
          </div>
        </div>
      </div>
      <div class="phone" aria-label="登録済みデバイス登録リンクで開いた場合の画面">
        <div class="screen">
          <div class="phonebar"><span>9:42</span><span>5G 100%</span></div>
          <div class="notice error">
            <strong>登録できません</strong>
            <span>この登録リンクはすでに使用されています。</span>
          </div>
          <div class="body">
            <div class="row"><span>状況</span><b>別の端末で登録済み</b></div>
            <div class="row"><span>対処</span><b>管理者から新しい登録リンクを発行してもらってください。</b></div>
            <div class="actions">
              <div class="button primary">閉じる</div>
              <div class="button">管理者に連絡</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      (() => {
        const sendSize = () => {
          const body = document.body;
          const height = Math.ceil(Math.max(body.scrollHeight, body.offsetHeight, body.getBoundingClientRect().height));
          window.parent.postMessage({ type: "diagram-frame-size", path: window.location.pathname, height }, window.location.origin);
        };
        window.addEventListener("load", sendSize);
        window.addEventListener("resize", sendSize);
        window.addEventListener("message", (event) => {
          if (event.origin === window.location.origin && event.data?.type === "diagram-frame-size-request") sendSize();
        });
        if (typeof ResizeObserver !== "undefined") new ResizeObserver(sendSize).observe(document.body);
        sendSize();
      })();
    </script>
  </body>
</html>
