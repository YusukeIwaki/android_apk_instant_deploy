<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --ink: #1b1b1b;
        --muted: #565c65;
        --line: #dfe1e2;
        --blue: #005ea8;
        --green: #2e7044;
        --bg: #f7f9fa;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        overflow: hidden;
      }

      body {
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 18px;
      }

      .phone {
        background: #111;
        border-radius: 34px;
        margin: 0 auto;
        max-width: 360px;
        padding: 12px;
      }

      .screen {
        background: #fff;
        border-radius: 24px;
        min-height: 570px;
        overflow: hidden;
      }

      .statusbar {
        align-items: center;
        background: #f7f9fa;
        display: flex;
        font-size: 12px;
        font-weight: 700;
        justify-content: space-between;
        padding: 10px 18px 8px;
      }

      .camera {
        background:
          linear-gradient(rgba(0, 0, 0, 0.28), rgba(0, 0, 0, 0.28)),
          repeating-linear-gradient(45deg, #2d3b42 0 18px, #35464e 18px 36px);
        color: #fff;
        min-height: 330px;
        padding: 18px;
        position: relative;
      }

      .camera h1 {
        font-size: 18px;
        margin: 0;
      }

      .viewfinder {
        border: 3px solid rgba(255, 255, 255, 0.9);
        height: 190px;
        left: 50%;
        position: absolute;
        top: 78px;
        transform: translateX(-50%);
        width: 190px;
      }

      .qr {
        background:
          linear-gradient(90deg, #111 50%, transparent 50%) 0 0 / 18px 18px,
          linear-gradient(#111 50%, transparent 50%) 0 0 / 18px 18px,
          #fff;
        border: 12px solid #fff;
        height: 132px;
        left: 50%;
        position: absolute;
        top: 106px;
        transform: translateX(-50%);
        width: 132px;
      }

      .sheet {
        padding: 18px;
      }

      .sheet h2 {
        font-size: 22px;
        line-height: 1.2;
        margin: 0 0 8px;
      }

      p {
        color: var(--muted);
        line-height: 1.55;
        margin: 0 0 14px;
      }

      .scheme {
        background: var(--bg);
        border: 1px solid var(--line);
        color: var(--blue);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        line-height: 1.45;
        padding: 9px;
        word-break: break-all;
      }

      .button {
        background: var(--blue);
        color: #fff;
        display: block;
        font-weight: 700;
        margin-top: 14px;
        padding: 12px;
        text-align: center;
      }

      .note {
        background: #ecf3ec;
        color: var(--green);
        font-size: 12px;
        margin-top: 12px;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <div class="phone" aria-label="スマートフォンでQRコードを読み取りアプリを起動">
      <div class="screen">
        <div class="statusbar"><span>9:41</span><span>5G 100%</span></div>
        <div class="camera">
          <h1>QR reader</h1>
          <div class="viewfinder" aria-hidden="true"></div>
          <div class="qr" aria-hidden="true"></div>
        </div>
        <div class="sheet">
          <h2>登録リンクを検出</h2>
          <p>custom schemeをOSが解決し、APK Remote Companionを起動します。</p>
          <div class="scheme">apkdist://register-device?identifier=drt_01HX9A2W...&amp;secret=drs_4Gk...</div>
          <div class="button">APK Remote Companionを開く</div>
        </div>
      </div>
    </div>
    <script>
      (() => {
        const sendSize = () => {
          const body = document.body;
          const height = Math.ceil(Math.max(body.scrollHeight, body.offsetHeight, body.getBoundingClientRect().height));
          window.parent.postMessage({ type: "diagram-frame-size", path: window.location.pathname, height }, window.location.origin);
        };
        window.addEventListener("load", sendSize);
        window.addEventListener("resize", sendSize);
        window.addEventListener("message", (event) => {
          if (event.origin === window.location.origin && event.data?.type === "diagram-frame-size-request") sendSize();
        });
        if (typeof ResizeObserver !== "undefined") new ResizeObserver(sendSize).observe(document.body);
        sendSize();
      })();
    </script>
  </body>
</html>
