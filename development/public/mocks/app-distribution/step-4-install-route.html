<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --ink: #1b1b1b;
        --muted: #565c65;
        --line: #dfe1e2;
        --blue: #005ea8;
        --bar: #f7f9fa;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        overflow: hidden;
      }

      body {
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 18px;
      }

      .phone {
        background: #111;
        border-radius: 34px;
        margin: 0 auto;
        max-width: 390px;
        padding: 12px;
      }

      .screen {
        background: #fff;
        border-radius: 24px;
        min-height: 690px;
        overflow: hidden;
      }

      .statusbar {
        align-items: center;
        background: var(--bar);
        display: flex;
        font-size: 12px;
        font-weight: 700;
        justify-content: space-between;
        padding: 10px 18px 8px;
      }

      .shade {
        background: rgba(20, 28, 40, 0.92);
        color: #f7f9fa;
        min-height: 620px;
        padding: 14px 12px;
      }

      .shade-header {
        align-items: center;
        color: #c9cdd1;
        display: flex;
        font-size: 12px;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .notification {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
        color: var(--ink);
        margin-bottom: 10px;
        overflow: hidden;
        padding: 14px;
      }

      .notification-app {
        align-items: center;
        color: var(--muted);
        display: flex;
        font-size: 11px;
        gap: 6px;
        margin-bottom: 6px;
      }

      .app-icon {
        background: var(--blue);
        border-radius: 4px;
        height: 16px;
        width: 16px;
      }

      .ongoing {
        color: var(--muted);
        font-size: 11px;
        margin-left: auto;
      }

      .notification-title {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 3px;
      }

      .notification-body {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .notification-actions {
        border-top: 1px solid var(--line);
        display: flex;
        gap: 16px;
        margin-top: 10px;
        padding-top: 8px;
      }

      .notification-actions span {
        color: var(--blue);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="phone" aria-label="通知シェードに表示される必須アプリのインストール通知">
      <div class="screen">
        <div class="statusbar"><span>10:14</span><span>5G 100%</span></div>
        <div class="shade">
          <div class="shade-header">
            <span>通知</span>
            <span>10:14</span>
          </div>
          <div class="notification" aria-label="必須アプリのインストール通知 (配送アプリ)">
            <div class="notification-app">
              <span class="app-icon" aria-hidden="true"></span>APK Instant Deploy
              <span class="ongoing">• 消去不可</span>
            </div>
            <div class="notification-title">必須アプリのインストールが必要です</div>
            <div class="notification-body">配送アプリ をインストールしてください。</div>
            <div class="notification-actions">
              <span>インストール</span>
            </div>
          </div>
          <div class="notification" aria-label="必須アプリのインストール通知 (棚卸アプリ)">
            <div class="notification-app">
              <span class="app-icon" aria-hidden="true"></span>APK Instant Deploy
              <span class="ongoing">• 消去不可</span>
            </div>
            <div class="notification-title">必須アプリのインストールが必要です</div>
            <div class="notification-body">棚卸アプリ をインストールしてください。</div>
            <div class="notification-actions">
              <span>インストール</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      (() => {
        const sendSize = () => {
          const body = document.body;
          const height = Math.ceil(Math.max(body.scrollHeight, body.offsetHeight, body.getBoundingClientRect().height));
          window.parent.postMessage({ type: "diagram-frame-size", path: window.location.pathname, height }, window.location.origin);
        };
        window.addEventListener("load", sendSize);
        window.addEventListener("resize", sendSize);
        window.addEventListener("message", (event) => {
          if (event.origin === window.location.origin && event.data?.type === "diagram-frame-size-request") sendSize();
        });
        if (typeof ResizeObserver !== "undefined") new ResizeObserver(sendSize).observe(document.body);
        sendSize();
      })();
    </script>
  </body>
</html>
