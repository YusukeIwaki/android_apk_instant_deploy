<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --ink: #1b1b1b;
        --muted: #565c65;
        --line: #dfe1e2;
        --blue: #005ea8;
        --green: #2e7044;
        --gold: #ffbe2e;
        --bg: #f7f9fa;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        overflow: hidden;
      }

      body {
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 18px;
      }

      .phone {
        background: #111;
        border-radius: 34px;
        margin: 0 auto;
        max-width: 370px;
        padding: 12px;
      }

      .screen {
        background: #fff;
        border-radius: 24px;
        min-height: 650px;
        overflow: hidden;
      }

      .statusbar {
        align-items: center;
        background: var(--bg);
        display: flex;
        font-size: 12px;
        font-weight: 700;
        justify-content: space-between;
        padding: 10px 18px 8px;
      }

      .bar {
        background: var(--bg);
        border-bottom: 1px solid var(--line);
        font-weight: 700;
        padding: 14px 16px;
      }

      .body {
        padding: 18px;
      }

      h1 {
        font-size: 22px;
        line-height: 1.2;
        margin: 0 0 8px;
      }

      p {
        color: var(--muted);
        line-height: 1.55;
        margin: 0 0 14px;
      }

      .event {
        border: 1px solid var(--line);
        margin-bottom: 14px;
      }

      .row {
        display: grid;
        gap: 10px;
        grid-template-columns: 28px minmax(0, 1fr);
        padding: 11px;
      }

      .row + .row {
        border-top: 1px solid var(--line);
      }

      .icon {
        background: var(--blue);
        color: #fff;
        display: grid;
        font-size: 11px;
        font-weight: 700;
        height: 28px;
        place-items: center;
        width: 28px;
      }

      .icon.ok {
        background: var(--green);
      }

      .row span {
        color: var(--muted);
        display: block;
        font-size: 12px;
        margin-top: 2px;
      }

      .button {
        background: var(--blue);
        color: #fff;
        display: block;
        font-weight: 700;
        margin: 12px 0;
        padding: 12px;
        text-align: center;
      }

      .state {
        background: #fff5c2;
        border-left: 5px solid var(--gold);
        color: #3d4551;
        font-size: 13px;
        line-height: 1.45;
        padding: 10px;
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <div class="phone" aria-label="スマートフォン上のPolicy再取得画面">
      <div class="screen">
        <div class="statusbar"><span>10:12</span><span>5G 100%</span></div>
        <div class="bar">APK Remote Companion</div>
        <div class="body">
          <h1>最新の配信設定を受信</h1>
          <p>新しい配信設定が届きました。次の画面でアプリを同期します。</p>
          <div class="event">
            <div class="row">
              <div class="icon ok">10:12</div>
              <div><b>更新を受信</b><span>サーバーから新しい配信設定が届きました</span></div>
            </div>
            <div class="row">
              <div class="icon ok">10:12</div>
              <div><b>最新の構成を取得</b><span>同期するアプリの一覧を確認できます</span></div>
            </div>
          </div>
          <div class="button">いますぐ手動で更新</div>
          <div class="state">
            前回の同期: 09:48<br />
            今回の更新: 10:12<br />
            更新後の構成を端末へ反映する準備ができました。
          </div>
        </div>
      </div>
    </div>
    <script>
      (() => {
        const sendSize = () => {
          const body = document.body;
          const height = Math.ceil(Math.max(body.scrollHeight, body.offsetHeight, body.getBoundingClientRect().height));
          window.parent.postMessage({ type: "diagram-frame-size", path: window.location.pathname, height }, window.location.origin);
        };
        window.addEventListener("load", sendSize);
        window.addEventListener("resize", sendSize);
        window.addEventListener("message", (event) => {
          if (event.origin === window.location.origin && event.data?.type === "diagram-frame-size-request") sendSize();
        });
        if (typeof ResizeObserver !== "undefined") new ResizeObserver(sendSize).observe(document.body);
        sendSize();
      })();
    </script>
  </body>
</html>
