<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --ink: #1b1b1b;
        --muted: #565c65;
        --line: #dfe1e2;
        --blue: #005ea8;
        --green: #2e7044;
        --gold: #ffbe2e;
        --red: #d83933;
        --bg: #f7f9fa;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        overflow: hidden;
      }

      body {
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 18px;
      }

      .phone {
        background: #111;
        border-radius: 34px;
        margin: 0 auto;
        max-width: 390px;
        padding: 12px;
      }

      .screen {
        background: #fff;
        border-radius: 24px;
        min-height: 690px;
        overflow: hidden;
      }

      .statusbar {
        align-items: center;
        background: var(--bg);
        display: flex;
        font-size: 12px;
        font-weight: 700;
        justify-content: space-between;
        padding: 10px 18px 8px;
      }

      .bar {
        background: var(--bg);
        border-bottom: 1px solid var(--line);
        font-weight: 700;
        padding: 14px 16px;
      }

      .body {
        padding: 18px;
      }

      h1 {
        font-size: 22px;
        line-height: 1.2;
        margin: 0 0 8px;
      }

      p {
        color: var(--muted);
        line-height: 1.55;
        margin: 0 0 14px;
      }

      .banner {
        background: #e7f6f8;
        border-left: 5px solid var(--blue);
        color: #3d4551;
        font-size: 13px;
        line-height: 1.45;
        margin-bottom: 12px;
        padding: 10px;
      }

      .list {
        border: 1px solid var(--line);
      }

      .item {
        display: grid;
        gap: 10px;
        grid-template-columns: 78px minmax(0, 1fr);
        padding: 10px;
      }

      .item + .item {
        border-top: 1px solid var(--line);
      }

      .badge {
        align-items: center;
        display: flex;
        font-size: 11px;
        font-weight: 700;
        justify-content: center;
        min-height: 28px;
        padding: 4px;
        text-align: center;
      }

      .install {
        background: #ecf3ec;
        color: var(--green);
      }

      .keep {
        background: #f7f9fa;
        color: #3d4551;
      }

      .available {
        background: #fff5c2;
        color: #7d5f00;
      }

      .remove {
        background: #fde0db;
        color: var(--red);
      }

      .item span {
        color: var(--muted);
        display: block;
        font-size: 12px;
        margin-top: 2px;
      }

      .button {
        background: var(--blue);
        color: #fff;
        display: block;
        font-weight: 700;
        margin-top: 14px;
        padding: 12px;
        text-align: center;
      }

      .button.disabled {
        background: #e1e3e1;
        color: #565c65;
      }
    </style>
  </head>
  <body>
    <div class="phone" aria-label="スマートフォン上のアプリ詳細画面">
      <div class="screen">
        <div class="statusbar"><span>10:13</span><span>5G 100%</span></div>
        <div class="bar">APK Remote Companion</div>
        <div class="body">
          <h1>com.example.appa</h1>
          <p>version 1.0.0</p>
          <div class="button disabled">ダウンロード中</div>
        </div>
      </div>
    </div>
    <script>
      (() => {
        const sendSize = () => {
          const body = document.body;
          const height = Math.ceil(Math.max(body.scrollHeight, body.offsetHeight, body.getBoundingClientRect().height));
          window.parent.postMessage({ type: "diagram-frame-size", path: window.location.pathname, height }, window.location.origin);
        };
        window.addEventListener("load", sendSize);
        window.addEventListener("resize", sendSize);
        window.addEventListener("message", (event) => {
          if (event.origin === window.location.origin && event.data?.type === "diagram-frame-size-request") sendSize();
        });
        if (typeof ResizeObserver !== "undefined") new ResizeObserver(sendSize).observe(document.body);
        sendSize();
      })();
    </script>
  </body>
</html>
