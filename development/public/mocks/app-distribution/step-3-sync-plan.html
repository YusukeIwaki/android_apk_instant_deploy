<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --ink: #1b1b1b;
        --muted: #565c65;
        --line: #dfe1e2;
        --blue: #005ea8;
        --bar: #f7f9fa;
        --disabled-bg: #e1e3e1;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        overflow: hidden;
      }

      body {
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 18px;
      }

      .phone {
        background: #111;
        border-radius: 34px;
        margin: 0 auto;
        max-width: 380px;
        padding: 12px;
      }

      .screen {
        background: #fff;
        border-radius: 24px;
        min-height: 660px;
        overflow: hidden;
      }

      .statusbar {
        align-items: center;
        background: var(--bar);
        display: flex;
        font-size: 12px;
        font-weight: 700;
        justify-content: space-between;
        padding: 10px 18px 8px;
      }

      .topbar {
        align-items: center;
        background: var(--bar);
        border-bottom: 1px solid var(--line);
        display: flex;
        gap: 10px;
        padding: 13px 14px;
      }

      .topbar .back {
        color: var(--ink);
        font-size: 22px;
        font-weight: 700;
      }

      .body {
        padding: 20px 18px;
      }

      h1 {
        font-size: 22px;
        font-weight: 700;
        line-height: 1.25;
        margin: 0 0 8px;
      }

      .meta {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.55;
        margin: 0 0 14px;
      }

      .meta .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .button {
        align-items: center;
        border-radius: 22px;
        display: flex;
        font-size: 14px;
        font-weight: 700;
        justify-content: center;
        margin-top: 6px;
        min-height: 44px;
        padding: 10px 14px;
      }

      .button.primary {
        background: var(--blue);
        color: #fff;
      }

      .button.disabled {
        background: var(--disabled-bg);
        color: #8a9099;
      }
    </style>
  </head>
  <body>
    <div class="phone" aria-label="コンパニオンアプリのアプリ詳細画面。ダウンロード進行中">
      <div class="screen">
        <div class="statusbar"><span>10:13</span><span>5G 100%</span></div>
        <div class="topbar"><span class="back" aria-hidden="true">←</span></div>
        <div class="body">
          <h1>配送アプリ</h1>
          <p class="meta">
            <span class="mono">com.example.appc</span><br />
            version 0.9.3<br />
            ダウンロード中 50%
          </p>
          <div class="button disabled">ダウンロード中</div>
        </div>
      </div>
    </div>
    <script>
      (() => {
        const sendSize = () => {
          const body = document.body;
          const height = Math.ceil(Math.max(body.scrollHeight, body.offsetHeight, body.getBoundingClientRect().height));
          window.parent.postMessage({ type: "diagram-frame-size", path: window.location.pathname, height }, window.location.origin);
        };
        window.addEventListener("load", sendSize);
        window.addEventListener("resize", sendSize);
        window.addEventListener("message", (event) => {
          if (event.origin === window.location.origin && event.data?.type === "diagram-frame-size-request") sendSize();
        });
        if (typeof ResizeObserver !== "undefined") new ResizeObserver(sendSize).observe(document.body);
        sendSize();
      })();
    </script>
  </body>
</html>
