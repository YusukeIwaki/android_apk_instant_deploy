openapi: 3.1.0
info:
  title: Android APK Instant Deploy API
  version: 0.1.0
  description: |
    API definition for the APK instant deploy server.

    The API is split by audience into two path prefixes:

    - `/admin/...` : Admin API. Intended for the operator/admin web UI and CI.
      Authenticated with an admin bearer token.
    - `/api/...`   : Android App API. Intended for the companion Android app.
      Device registration uses a registration token and secret in the request
      body; registered-device endpoints use a device bearer token.

    URL identifier rule:

    - `devices` paths use `{identifier}` (= `devices.identifier`, which is taken
      from the issued `DeviceRegistrationToken.identifier`). Internal references
      still use the AR primary key `devices.id`, but it is not exposed in URLs.
    - `releases`, `artifacts`, `apps` paths use `{id}` (their AR primary key).
      Apps additionally carry `package_name` as a business identifier, but the
      stable external reference is `apps.id`. Apps are hard-deleted when their
      last release is removed; re-uploading the same `package_name` later
      creates a NEW `apps.id` rather than reviving an old row.

    APK upload is a single multipart/form-data request to POST /admin/artifacts.
    There is no separate pre-upload URL endpoint, no multipart cache, and no
    intermediate cache storage; the server parses, validates, and stores the APK
    in one shot. Releases are append-only: re-uploading identical APK bytes is
    rejected by artifact sha256, while the same (app, version_code) is accepted
    when the checksum differs. Release / app rows are removed only by explicit
    admin DELETE.

    DevicePolicy entries reference apps (by `app.id`) — not specific releases.
    The release to install for each entry is resolved by the server on every
    fetch as the latest release of that app. Soft-deleted apps (when their last
    release is removed) remain referenced by historical policies and are shown
    as "deleted app" in the admin UI; device-facing GETs filter them out.

    Errors are returned as `{ "error": { "code": "...", "message": "..." } }` and
    use common HTTP status codes (400, 401, 403, 404, 502). Each endpoint's
    error response lists the concrete error codes that endpoint can actually
    return as named examples. 502 is used specifically for upstream object storage
    failures (ARTIFACT_UPLOAD_FAILED / ARTIFACT_DELETE_FAILED) where the API
    server itself is healthy but its dependency is not.
servers:
  - url: http://localhost:4567
    description: Local Docker Compose server
tags:
  - name: Admin API
    description: APIs used by the administrator web UI.
  - name: Android App API
    description: APIs used by the Android companion app.
paths:
  /admin/artifacts:
    post:
      tags:
        - Admin API
      operationId: createArtifact
      summary: Upload an APK and create app / release records
      description: |
        Accepts an APK file as a single multipart/form-data upload. The server parses
        APK metadata (package_name, version_code, version_name, sha256, signing
        certificate, application label, launcher icon), validates it (including
        signing certificate compatibility with any existing release for the same
        package), then stores the file to the configured object store and creates
        or updates the artifact / app / app profile / app icon / release records
        in one transaction.

        Pre-upload URL issuance, multipart cache uploads, intermediate cache storage,
        changelogs, and build-source metadata (branch / commit / build number) are
        intentionally out of scope for this endpoint.
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ArtifactCreateRequest"
            encoding:
              file:
                contentType: application/vnd.android.package-archive
      responses:
        "201":
          $ref: "#/components/responses/ArtifactCreateResponse"
        "400":
          description: APK or request body was rejected. No artifact / app / release row and no stored object are created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_apk:
                  summary: File is not a parseable APK
                  value:
                    error:
                      code: INVALID_APK
                      message: file must be a parseable APK.
                signing_cert_mismatch:
                  summary: Signing certificate differs from the previously registered release
                  value:
                    error:
                      code: SIGNING_CERT_MISMATCH
                      message: Signing certificate differs from the previously registered release for this package.
                artifact_already_exists:
                  summary: The exact same APK artifact was already uploaded
                  value:
                    error:
                      code: ARTIFACT_ALREADY_EXISTS
                      message: The exact same APK artifact has already been uploaded. Re-uploading the same package_name and version_code is allowed only when the APK checksum differs.
                file_required:
                  summary: Missing or duplicated "file" multipart field
                  value:
                    error:
                      code: FILE_REQUIRED
                      message: multipart field "file" is required (exactly one).
        "401":
          $ref: "#/components/responses/AdminUnauthorizedError"
        "502":
          description: Upstream object storage failed while persisting the APK.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                artifact_upload_failed:
                  summary: Storing the APK to object storage failed
                  value:
                    error:
                      code: ARTIFACT_UPLOAD_FAILED
                      message: Failed to store the uploaded APK. Retry the upload.

  /admin/apps:
    get:
      tags:
        - Admin API
      operationId: listApps
      summary: List registered apps with their releases
      description: |
        Returns the catalog of apps currently registered, with each app's releases
        listed inline (most recent first). After POST /admin/artifacts succeeds, the
        admin polls this endpoint to confirm that the upload reached the catalog
        (a new app appears for a new package_name, or a new release entry appears
        under an existing app).
      security:
        - AdminBearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/AppsListResponse"
        "401":
          $ref: "#/components/responses/AdminUnauthorizedError"

  /admin/releases/{release_id}:
    delete:
      tags:
        - Admin API
      operationId: deleteRelease
      summary: Delete a release (and its artifact and stored object)
      description: |
        Deletes a release. The associated artifact row is destroyed transitively, and
        the artifact destroy callback removes the stored APK object. The app row is
        kept so that future uploads with the same package_name resolve to the same
        app.

        There is no direct artifact deletion API. Removing an APK from distribution
        always goes through deleting the release that references it.
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReleaseId"
      responses:
        "204":
          description: Release was deleted.
        "401":
          $ref: "#/components/responses/AdminUnauthorizedError"
        "404":
          description: Release was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                release_not_found:
                  value:
                    error:
                      code: RELEASE_NOT_FOUND
                      message: Release was not found.
        "502":
          description: Upstream object storage failed while removing the artifact's stored object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                artifact_delete_failed:
                  value:
                    error:
                      code: ARTIFACT_DELETE_FAILED
                      message: Failed to remove the stored APK object. The release was not deleted.

  /api/releases/{release_id}/artifact_url:
    get:
      tags:
        - Android App API
      operationId: getReleaseArtifactUrl
      summary: Get a short-lived artifact download URL
      description: |
        Returns a short-lived URL for downloading the APK artifact for a release.
        Devices call this only for releases they need to install. The initial TTL
        target is 15 minutes; if the URL expires during download, the device
        discards the partial file and requests a new URL for the same release.
      security:
        - DeviceBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReleaseId"
      responses:
        "200":
          $ref: "#/components/responses/ReleaseArtifactUrlDetailResponse"
        "401":
          $ref: "#/components/responses/DeviceUnauthorizedError"
        "404":
          description: Release was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                release_not_found:
                  value:
                    error:
                      code: RELEASE_NOT_FOUND
                      message: Release was not found.

  /admin/device_registration_tokens:
    post:
      tags:
        - Admin API
      operationId: createDeviceRegistrationToken
      summary: Create a device registration link
      description: |
        Creates a DeviceRegistrationToken and returns the custom scheme URL that the
        administrator can show as a link or QR code. This does not create a device.
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceRegistrationTokenCreateRequest"
            examples:
              default:
                value:
                  expires_in_minutes: 30
      responses:
        "201":
          $ref: "#/components/responses/DeviceRegistrationTokenDetailResponse"
        "400":
          description: Request body was rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_request:
                  summary: Body is missing or not valid JSON
                  value:
                    error:
                      code: INVALID_REQUEST
                      message: Request body is not valid JSON.
                expires_in_minutes_invalid:
                  summary: expires_in_minutes is missing or out of range
                  value:
                    error:
                      code: EXPIRES_IN_MINUTES_INVALID
                      message: expires_in_minutes must be a positive integer.
        "401":
          $ref: "#/components/responses/AdminUnauthorizedError"

  /api/devices:
    post:
      tags:
        - Android App API
      operationId: registerDevice
      summary: Register a device from a DeviceRegistrationToken
      description: |
        Registers a device using the identifier and registration_secret from
        the custom scheme link. The app must obtain an FCM token and a required
        display_name before calling this API.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceCreateRequest"
            examples:
              default:
                value:
                  identifier: drt_01HX9A2W...
                  registration_secret: drs_4Gk...
                  display_name: Pixel 8 QA-01
                  fcm_push_token: fcm:APA91b...
      responses:
        "201":
          $ref: "#/components/responses/DeviceCreateResponse"
        "400":
          description: Request body was rejected before any registration was attempted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                display_name_required:
                  value:
                    error:
                      code: DISPLAY_NAME_REQUIRED
                      message: display_name is required.
                fcm_push_token_required:
                  value:
                    error:
                      code: FCM_PUSH_TOKEN_REQUIRED
                      message: fcm_push_token is required.
                invalid_request:
                  summary: Body is missing or not valid JSON
                  value:
                    error:
                      code: INVALID_REQUEST
                      message: Request body is not valid JSON.
        "403":
          description: |
            The same identifier already has a registered device. devices /
            device_profiles / fcm_push_tokens / device_credentials are not modified.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                device_already_registered:
                  value:
                    error:
                      code: DEVICE_ALREADY_REGISTERED
                      message: A device already exists for this identifier.
        "404":
          description: |
            Registration link is expired, has already been consumed, or the secret is
            incorrect. The three cases are intentionally folded into one response so
            that link-state probing is not possible from the client.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                registration_token_not_found:
                  value:
                    error:
                      code: REGISTRATION_TOKEN_NOT_FOUND
                      message: Registration link is expired, already used, or the secret is incorrect.

  /api/devices/me/fcm_push_token:
    put:
      tags:
        - Android App API
      operationId: updateDeviceFcmPushToken
      summary: Update the authenticated device's FCM push token
      description: |
        Updates the encrypted `fcm_push_tokens` record for the authenticated
        device when Firebase Messaging rotates the device token. This endpoint
        does not change device identity, profile, credentials, policy, or sync
        records.
      security:
        - DeviceBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FcmPushTokenUpdateRequest"
            examples:
              default:
                value:
                  fcm_push_token: fcm:APA91b...
      responses:
        "200":
          $ref: "#/components/responses/FcmPushTokenUpdateResponse"
        "400":
          description: Request body was rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                fcm_push_token_required:
                  value:
                    error:
                      code: FCM_PUSH_TOKEN_REQUIRED
                      message: fcm_push_token is required.
        "401":
          $ref: "#/components/responses/DeviceUnauthorizedError"

  /admin/devices/{identifier}:
    delete:
      tags:
        - Admin API
      operationId: deleteDevice
      summary: Delete a registered device
      description: |
        Removes the device and its registration-side records in one transaction:
        device_credentials (which immediately invalidates the device's
        device_auth_token), fcm_push_tokens, device_profiles, device_policies,
        device_policy_revisions, device_policy_sync_reports, and finally
        devices itself.

        Observation tables (fcm_delivery_failures, device_heartbeats)
        are intentionally kept for audit; deletion is recorded in the admin
        operation log. After deletion, requests that present the old
        device_auth_token receive 401 DEVICE_AUTH_REQUIRED, and the admin must
        issue a new DeviceRegistrationToken to re-register the device.

        There is no end-user "unregister" API. Deletion is always an explicit
        admin action driven by the admin UI's observation signals (last
        contact time, FCM delivery failures, sync state). The server does not
        delete devices automatically.
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdentifier"
      responses:
        "204":
          description: Device was deleted.
        "401":
          $ref: "#/components/responses/AdminUnauthorizedError"
        "404":
          description: Device was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                device_not_found:
                  value:
                    error:
                      code: DEVICE_NOT_FOUND
                      message: Device was not found.

  /admin/devices/{identifier}/policy:
    get:
      tags:
        - Admin API
      operationId: getAdminDevicePolicy
      summary: Get a device's current policy (admin)
      description: |
        Returns the current DevicePolicy for the specified device. Used by the
        admin UI to load the policy before editing. Apps are hard-deleted when
        their last release is removed, and the related device_policy_app_entries
        rows are cascade-deleted at the same time, so every entry returned here
        references a currently-existing app (no "deleted app" state).
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdentifier"
      responses:
        "200":
          $ref: "#/components/responses/AdminDevicePolicyResponse"
        "401":
          $ref: "#/components/responses/AdminUnauthorizedError"
        "404":
          description: Device or its policy could not be resolved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                device_not_found:
                  value:
                    error:
                      code: DEVICE_NOT_FOUND
                      message: Device was not found.
                device_policy_not_found:
                  value:
                    error:
                      code: DEVICE_POLICY_NOT_FOUND
                      message: Device policy has not been created for this device yet.
    put:
      tags:
        - Admin API
      operationId: updateDevicePolicy
      summary: Update a device policy
      description: |
        Replaces the target device's desired app state by creating a new immutable
        device_policy_revision and updating the device policy's current revision.

        Entries reference apps by `app.id` only. The release to install for each
        entry is resolved per-request by the server when the device fetches the
        policy (latest release for that app). version_code / release.id are not
        accepted in the request.

        The endpoint is designed for idempotent updates by an admin and does NOT
        use optimistic concurrency control (no `If-Match` header, no
        `current_revision_id` echo). Sending the same body twice results in two
        revisions whose entries are identical; the second revision becomes the
        current one. Concurrent edits by multiple admins are not protected at
        the server level — admins reconcile via reload-then-PUT.

        Validation rejects any `app.id` that does not currently exist in the
        `apps` table (e.g. the app was hard-deleted between admin's GET and PUT
        because its last release was removed). There is no separate
        `APP_DELETED` state since `apps.deleted_at` does not exist.
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdentifier"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevicePolicyUpdateRequest"
            examples:
              default:
                value:
                  entries:
                    - app:
                        id: 12
                      install_mode: FORCE_INSTALLED
                    - app:
                        id: 15
                      install_mode: AVAILABLE
      responses:
        "200":
          $ref: "#/components/responses/AdminDevicePolicyResponse"
        "400":
          description: Request body was rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_request:
                  summary: Body is missing or not valid JSON
                  value:
                    error:
                      code: INVALID_REQUEST
                      message: Request body is not valid JSON.
                install_mode_invalid:
                  summary: install_mode is not FORCE_INSTALLED or AVAILABLE
                  value:
                    error:
                      code: INSTALL_MODE_INVALID
                      message: install_mode must be one of FORCE_INSTALLED, AVAILABLE.
                app_not_found_for_entry:
                  summary: Referenced app.id does not exist (never existed or has been hard-deleted)
                  value:
                    error:
                      code: APP_NOT_FOUND_FOR_ENTRY
                      message: One or more entries reference an app that does not exist.
        "401":
          $ref: "#/components/responses/AdminUnauthorizedError"
        "404":
          description: Device was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                device_not_found:
                  value:
                    error:
                      code: DEVICE_NOT_FOUND
                      message: Device was not found.

  /api/notifications:
    get:
      tags:
        - Android App API
      operationId: listDeviceNotifications
      summary: List sticky notifications for the authenticated device
      description: |
        Returns the set of sticky notifications the authenticated device should
        currently show. The same set backs both the OS-level sticky notifications
        and the in-app notification inbox (the bell icon on the home screen);
        callers do not maintain a separate inbox state.

        Each notification represents an outstanding condition that requires user
        attention (for example: a FORCE_INSTALLED app whose install requires
        PACKAGE_INSTALLER confirmation, or a recoverable download failure that
        needs a user-driven retry). When the condition is resolved, the
        notification disappears from this list on the next fetch; clients do not
        DELETE individual notifications and there is no user-side mute or
        snooze. The server is the single source of truth for what is sticky.

        Order: newest `created_at` first. Clients re-fetch on app foreground and
        on pull-to-refresh; FCM may also push a hint to refetch.
      security:
        - DeviceBearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/NotificationListResponse"
        "401":
          $ref: "#/components/responses/DeviceUnauthorizedError"

  /api/devices/me/policy:
    get:
      tags:
        - Android App API
      operationId: getDevicePolicy
      summary: Get the current policy for the authenticated device
      description: |
        Returns the latest DevicePolicy snapshot for the authenticated companion app.
        The device stores this as its fetched policy snapshot.

        Devices that do not yet have a DevicePolicy receive a 200 response with an
        empty `entries` array. 404 is only returned when the device itself can no
        longer be resolved.
      security:
        - DeviceBearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/DevicePolicyFetchResponse"
        "401":
          $ref: "#/components/responses/DeviceUnauthorizedError"
        "404":
          description: Device policy could not be resolved for the authenticated device.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                device_policy_not_found:
                  value:
                    error:
                      code: DEVICE_POLICY_NOT_FOUND
                      message: Device policy could not be resolved for the authenticated device.

  /api/devices/me/policy_sync_results:
    post:
      tags:
        - Android App API
      operationId: createPolicySyncResult
      summary: Report a device policy sync result
      description: |
        Records the actions the companion app performed while applying a fetched
        DevicePolicy. Reporting a result does not rewrite the policy, releases, or
        push token records.

        Idempotency: the underlying `device_policy_sync_reports` table has a
        UNIQUE constraint on `(device_id, device_policy_revision_id)`. The
        client may safely re-POST the same payload on transient failures;
        duplicate submissions for the same `(device, revision)` are absorbed by
        the constraint and the server responds with 200 instead of 201. No
        separate `Idempotency-Key` header is required.

        `route` records the install path the companion app actually used
        (`AMAPI_CUSTOM_APP` for AMAPI SDK custom app install, `PACKAGE_INSTALLER`
        for PackageInstaller UI). See `/android-app-prereq/#install-axis`.
      security:
        - DeviceBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicySyncResultCreateRequest"
            examples:
              default:
                value:
                  device_policy_revision:
                    id: 901
                  fetched_policy_updated_at: "2026-05-23T10:12:04+09:00"
                  applied_policy_updated_at: "2026-05-23T10:13:20+09:00"
                  actions:
                    - package_name: com.example.appa
                      action: INSTALL
                      route: AMAPI_CUSTOM_APP
                      result: INSTALLED
                    - package_name: com.example.appc
                      action: INSTALL
                      route: AMAPI_CUSTOM_APP
                      result: FAILED
                      phase: INSTALL
                      code: SIGNATURE_MISMATCH
                    - package_name: com.example.appb
                      action: INSTALL
                      route: AMAPI_CUSTOM_APP
                      result: FAILED
                      phase: DOWNLOAD
                      code: ARTIFACT_GONE
                    - package_name: com.example.legacy
                      action: UNINSTALL
                      route: PACKAGE_INSTALLER
                      result: UNINSTALLED
      responses:
        "200":
          description: |
            The same policy sync result has already been recorded for this
            device_policy_revision. The server returns the previously recorded
            payload idempotently without creating a new row. Clients treat this
            the same as 201 (受理) and advance applied_policy_snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicySyncResultDetailResponse"
        "201":
          $ref: "#/components/responses/PolicySyncResultDetailResponse"
        "400":
          description: Request body was rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_request:
                  summary: Body is missing or not valid JSON
                  value:
                    error:
                      code: INVALID_REQUEST
                      message: Request body is not valid JSON.
                device_policy_revision_required:
                  summary: device_policy_revision.id is missing
                  value:
                    error:
                      code: DEVICE_POLICY_REVISION_REQUIRED
                      message: device_policy_revision.id is required.
                actions_invalid:
                  summary: actions array is missing or contains invalid entries
                  value:
                    error:
                      code: ACTIONS_INVALID
                      message: actions must be an array of valid PolicySyncAction objects.
        "401":
          $ref: "#/components/responses/DeviceUnauthorizedError"
        "404":
          description: The referenced device_policy_revision was not found for this device.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                device_policy_revision_not_found:
                  value:
                    error:
                      code: DEVICE_POLICY_REVISION_NOT_FOUND
                      message: The referenced device_policy_revision was not found for this device.

components:
  securitySchemes:
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-admin-token
      description: Bearer token issued for the administrator web UI.
    DeviceBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-device-token
      description: Bearer token issued per registered Android companion app/device.

  parameters:
    DeviceIdentifier:
      name: identifier
      in: path
      required: true
      schema:
        type: string
      description: Device identifier (equal to the consumed DeviceRegistrationToken identifier).
      example: drt_01HX9A2W...
    ReleaseId:
      name: release_id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: ActiveRecord ID of the release.
      example: 301
  responses:
    ArtifactCreateResponse:
      description: |
        APK artifact was stored and a new release was appended. The response carries
        only the artifact's metadata. The same transaction also creates an app row
        (if new package_name) and a new release row, but those changes are not
        reflected in this response; clients confirm them through GET /admin/apps.
        Releases are append-only: re-uploading identical APK bytes is rejected
        (400 ARTIFACT_ALREADY_EXISTS), while the same (app, version_code) may
        create another release when artifact sha256 differs. Existing releases
        are only removed by an explicit DELETE.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ArtifactCreateResponse"
          examples:
            new_release:
              summary: First upload for a new package
              value:
                artifact:
                  id: 101
                  filename: qa-camera-2.4.0-42.apk
                  sha256: 58f7d4...
                  size_bytes: 50541312
                  signing_cert_sha256: 9a5c0e...
            new_version_for_existing_app:
              summary: Uploading a new version of an existing package
              value:
                artifact:
                  id: 102
                  filename: qa-camera-2.4.1-43.apk
                  sha256: a91c0b...
                  size_bytes: 50621984
                  signing_cert_sha256: 9a5c0e...
    AppsListResponse:
      description: |
        Catalog of apps registered on this server, with each app's releases listed
        inline. Order: apps sorted by latest activity first; releases within each
        app sorted by version_code descending, then release id descending for
        repeated version_code uploads.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppsListResponse"
          examples:
            default:
              value:
                apps:
                  - id: 12
                    package_name: com.example.qacamera
                    releases:
                      - id: 301
                        version_code: 42
                        version_name: 2.4.0-qa
                  - id: 11
                    package_name: com.example.scanner
                    releases:
                      - id: 211
                        version_code: 7
                        version_name: 1.3.0
                      - id: 210
                        version_code: 6
                        version_name: 1.2.4
                  - id: 9
                    package_name: com.example.kiosk
                    releases:
                      - id: 180
                        version_code: 12
                        version_name: 3.1.0
    DeviceCreateResponse:
      description: Device was registered.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DeviceCreateResponse"
    DevicePolicyFetchResponse:
      description: |
        Current device policy for the authenticated device. Each entry has the
        resolved latest release attached as `install` (release.id, version_code,
        version_name, artifact_sha256). All entries reference apps that
        currently exist; deleted apps cannot remain as entries because they are
        FK-cascaded out at delete time.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DevicePolicyFetchResponse"
          examples:
            default:
              value:
                device_policy_revision:
                  id: 901
                updated_at: "2026-05-23T10:12:00+09:00"
                server_time: "2026-05-23T10:12:04+09:00"
                entries:
                  - app:
                      id: 12
                      package_name: com.example.appa
                      display_name: 勤怠アプリ
                    install_mode: FORCE_INSTALLED
                    install:
                      release:
                        id: 301
                      version_code: 42
                      version_name: 2.4.0-qa
                      artifact_sha256: 58f7d4...
                  - app:
                      id: 15
                      package_name: com.example.appd
                      display_name: 社内ポータル
                    install_mode: AVAILABLE
                    install:
                      release:
                        id: 612
                      version_code: 3
                      version_name: 0.3.1
                      artifact_sha256: 66ad22...
    AdminDevicePolicyResponse:
      description: |
        Current device policy for the admin UI. All entries reference apps that
        currently exist; deleted apps are not present because they are removed
        by FK cascade when the last release is deleted.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminDevicePolicyResponse"
          examples:
            default:
              value:
                device_policy:
                  identifier: drt_01HX9A2W...
                  current_revision:
                    id: 901
                  updated_at: "2026-05-23T10:12:00+09:00"
                  entries:
                    - app:
                        id: 12
                        package_name: com.example.appa
                        display_name: 勤怠アプリ
                      install_mode: FORCE_INSTALLED
                      install:
                        release:
                          id: 301
                        version_code: 42
                        version_name: 2.4.0-qa
                        artifact_sha256: 58f7d4...
    DeviceRegistrationTokenDetailResponse:
      description: Device registration link was created.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DeviceRegistrationTokenDetailResponse"
    FcmPushTokenUpdateResponse:
      description: FCM push token was updated for the authenticated device.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FcmPushTokenUpdateResponse"
          examples:
            default:
              value:
                fcm_push_token:
                  registered_at: "2026-05-26T12:34:56+09:00"
    PolicySyncResultDetailResponse:
      description: Policy sync result was recorded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PolicySyncResultDetailResponse"
    ReleaseArtifactUrlDetailResponse:
      description: Artifact download URL detail.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ReleaseArtifactUrlDetailResponse"
    NotificationListResponse:
      description: |
        Current set of sticky notifications for the authenticated device. The
        same set is mirrored by the OS notification tray and the in-app inbox
        (bell icon). Notifications that are no longer applicable do not appear
        in this response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/NotificationListResponse"
          examples:
            default:
              value:
                notifications:
                  - id: 4012
                    kind: INSTALL_PERMISSION_REQUIRED
                    title: 勤怠アプリ をインストールしてください
                    body: 必須アプリのインストール許可が必要です。
                    app:
                      id: 12
                      package_name: com.example.appa
                    created_at: "2026-05-26T10:11:00+09:00"
                  - id: 4013
                    kind: DOWNLOAD_RETRY_AVAILABLE
                    title: 配達ナビ のダウンロードを再試行できます
                    body: 通信できる場所で再試行してください。
                    app:
                      id: 14
                      package_name: com.example.appc
                    created_at: "2026-05-26T10:12:30+09:00"
            empty:
              summary: No outstanding notifications
              value:
                notifications: []
    AdminUnauthorizedError:
      description: Admin bearer token is missing or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            admin_auth_required:
              summary: No Authorization header
              value:
                error:
                  code: ADMIN_AUTH_REQUIRED
                  message: Admin bearer token is required.
            admin_auth_invalid:
              summary: Token is present but does not authenticate
              value:
                error:
                  code: ADMIN_AUTH_INVALID
                  message: Admin bearer token is invalid or has been revoked.
    DeviceUnauthorizedError:
      description: |
        Device bearer token is missing, invalid, or has been revoked. The three
        cases are intentionally folded into a single error code so the client
        only has to drive one re-registration flow.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            device_auth_required:
              summary: Token is missing, invalid, or revoked
              value:
                error:
                  code: DEVICE_AUTH_REQUIRED
                  message: Device bearer token is required. Re-register the device if it was previously valid.

  schemas:
    AppListItem:
      type: object
      additionalProperties: false
      required:
        - id
        - package_name
        - releases
      properties:
        id:
          type: integer
          minimum: 1
        package_name:
          type: string
          example: com.example.qacamera
        releases:
          type: array
          items:
            $ref: "#/components/schemas/AppListItemRelease"

    AppListItemRelease:
      type: object
      additionalProperties: false
      required:
        - id
        - version_code
        - version_name
      properties:
        id:
          type: integer
          minimum: 1
        version_code:
          type: integer
          minimum: 1
        version_name:
          type: string
          example: 2.4.0-qa

    AppsListResponse:
      type: object
      additionalProperties: false
      required:
        - apps
      properties:
        apps:
          type: array
          items:
            $ref: "#/components/schemas/AppListItem"

    Artifact:
      type: object
      additionalProperties: false
      description: |
        Metadata of the stored APK. Fields are limited to what an admin needs to
        recognize and verify the uploaded file (id, original filename, hash,
        size, signing certificate hash). Storage backend identifiers and object
        keys are intentionally not exposed.
      required:
        - id
        - filename
        - sha256
        - size_bytes
        - signing_cert_sha256
      properties:
        id:
          type: integer
          minimum: 1
        filename:
          type: string
          example: qa-camera-2.4.0-42.apk
        sha256:
          type: string
        size_bytes:
          type: integer
          minimum: 0
        signing_cert_sha256:
          type: string

    ArtifactCreateRequest:
      type: object
      additionalProperties: false
      required:
        - file
      properties:
        file:
          type: string
          format: binary
          description: |
            APK file. Sent as a single multipart/form-data part named "file".
            The server parses package_name, version_code, version_name, sha256,
            signing certificate, application label, and launcher icon from this
            file. The app-facing display name and icon are stored separately from
            the app identity; this request shape does not expose those models.

    ArtifactCreateResponse:
      type: object
      additionalProperties: false
      required:
        - artifact
      properties:
        artifact:
          $ref: "#/components/schemas/Artifact"

    DeviceCreateRequest:
      type: object
      additionalProperties: false
      required:
        - identifier
        - registration_secret
        - display_name
        - fcm_push_token
      properties:
        identifier:
          type: string
          example: drt_01HX9A2W...
        registration_secret:
          type: string
          example: drs_4Gk...
        display_name:
          type: string
          minLength: 1
          example: Pixel 8 QA-01
        fcm_push_token:
          type: string
          minLength: 1
          example: fcm:APA91b...

    DeviceCreateResponse:
      type: object
      additionalProperties: false
      required:
        - device
      properties:
        device:
          $ref: "#/components/schemas/RegisteredDevice"

    RegisteredDevice:
      type: object
      additionalProperties: false
      required:
        - identifier
        - device_auth_token
        - profile
        - registered_at
      properties:
        identifier:
          type: string
          example: drt_01HX9A2W...
        device_auth_token:
          type: string
          description: |
            Opaque bearer token. Returned in plaintext only once here; the server
            stores only a hash. Subsequent companion-app requests use this as the
            Bearer token for DeviceBearerAuth.
          example: dat_6m2...
        profile:
          $ref: "#/components/schemas/DeviceProfile"
        registered_at:
          type: string
          format: date-time

    AdminDevicePolicyResponse:
      type: object
      additionalProperties: false
      required:
        - device_policy
      properties:
        device_policy:
          $ref: "#/components/schemas/AdminDevicePolicy"

    AdminDevicePolicy:
      type: object
      additionalProperties: false
      required:
        - identifier
        - current_revision
        - updated_at
        - entries
      properties:
        identifier:
          type: string
          example: drt_01HX9A2W...
        current_revision:
          $ref: "#/components/schemas/DevicePolicyRevisionReference"
        updated_at:
          type: string
          format: date-time
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AdminDevicePolicyEntry"

    AdminDevicePolicyEntry:
      type: object
      additionalProperties: false
      description: |
        Admin-facing view of a policy entry. Always includes a currently-existing
        app and a resolved `install` (the latest release for that app at the
        time of the response). Deleted apps cannot appear here because their
        entries are FK-cascaded out at delete time.
      required:
        - app
        - install_mode
        - install
      properties:
        app:
          $ref: "#/components/schemas/PolicyAppView"
        install_mode:
          $ref: "#/components/schemas/InstallMode"
        install:
          $ref: "#/components/schemas/PolicyInstallTarget"

    PolicyAppView:
      type: object
      additionalProperties: false
      required:
        - id
        - package_name
        - display_name
      properties:
        id:
          type: integer
          minimum: 1
        package_name:
          type: string
          example: com.example.appa
        display_name:
          type: string
          minLength: 1
          example: 勤怠アプリ

    PolicyInstallTarget:
      type: object
      additionalProperties: false
      description: |
        The release the device should converge to for this entry. Resolved by the
        server at GET-time as the latest release for the app.
      required:
        - release
        - version_code
        - version_name
        - artifact_sha256
      properties:
        release:
          $ref: "#/components/schemas/ReleaseReference"
        version_code:
          type: integer
          minimum: 1
        version_name:
          type: string
          example: 2.4.0-qa
        artifact_sha256:
          type: string
          description: SHA-256 checksum of the APK bytes for the resolved release.
          example: 58f7d4...

    DevicePolicyEntry:
      type: object
      additionalProperties: false
      description: |
        Device-facing policy entry. Always includes a non-null `install`; deleted
        apps cannot appear here because their entries are FK-cascaded out at
        delete time.
      required:
        - app
        - install_mode
        - install
      properties:
        app:
          $ref: "#/components/schemas/DevicePolicyAppRef"
        install_mode:
          $ref: "#/components/schemas/InstallMode"
        install:
          $ref: "#/components/schemas/PolicyInstallTarget"

    DevicePolicyAppRef:
      type: object
      additionalProperties: false
      required:
        - id
        - package_name
        - display_name
      properties:
        id:
          type: integer
          minimum: 1
        package_name:
          type: string
          example: com.example.appa
        display_name:
          type: string
          minLength: 1
          example: 勤怠アプリ

    DevicePolicyFetchResponse:
      type: object
      additionalProperties: false
      required:
        - device_policy_revision
        - updated_at
        - server_time
        - entries
      properties:
        device_policy_revision:
          $ref: "#/components/schemas/DevicePolicyRevisionReference"
        updated_at:
          type: string
          format: date-time
        server_time:
          type: string
          format: date-time
        entries:
          type: array
          items:
            $ref: "#/components/schemas/DevicePolicyEntry"

    DevicePolicyRevisionReference:
      type: object
      additionalProperties: false
      required:
        - id
      properties:
        id:
          type: integer
          minimum: 1

    DevicePolicyUpdateEntry:
      type: object
      additionalProperties: false
      description: |
        Admin write-side entry. Only `app.id` and `install_mode` are supplied;
        the release to install is resolved on each fetch and is never specified
        here.
      required:
        - app
        - install_mode
      properties:
        app:
          type: object
          additionalProperties: false
          required:
            - id
          properties:
            id:
              type: integer
              minimum: 1
        install_mode:
          $ref: "#/components/schemas/InstallMode"

    DevicePolicyUpdateRequest:
      type: object
      additionalProperties: false
      required:
        - entries
      properties:
        entries:
          type: array
          minItems: 0
          items:
            $ref: "#/components/schemas/DevicePolicyUpdateEntry"

    DeviceProfile:
      type: object
      additionalProperties: false
      required:
        - display_name
      properties:
        display_name:
          type: string
          minLength: 1
          example: Pixel 8 QA-01

    DeviceRegistrationToken:
      type: object
      additionalProperties: false
      required:
        - identifier
        - registration_secret
        - issued_at
        - expires_at
        - deep_link
      properties:
        identifier:
          type: string
          example: drt_01HX9A2W...
        registration_secret:
          type: string
          description: |
            One-time secret returned in plaintext only in this response. The server
            stores only a hash. Embed this in the QR code / deep link together with
            the identifier.
          example: drs_4Gk...
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        deep_link:
          type: string
          format: uri
          example: apkdist://register-device?identifier=drt_01HX9A2W...&secret=drs_4Gk...&server_base_url=https%3A%2F%2Fdistribution.example.test

    DeviceRegistrationTokenCreateRequest:
      type: object
      additionalProperties: false
      required:
        - expires_in_minutes
      properties:
        expires_in_minutes:
          type: integer
          minimum: 1
          example: 30

    DeviceRegistrationTokenDetailResponse:
      type: object
      additionalProperties: false
      required:
        - device_registration_token
      properties:
        device_registration_token:
          $ref: "#/components/schemas/DeviceRegistrationToken"

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"

    ErrorBody:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code in SCREAMING_SNAKE_CASE.
          example: INVALID_APK
        message:
          type: string
          description: Human-readable error message in English.
          example: file must be a parseable APK.

    FcmPushTokenUpdateRequest:
      type: object
      additionalProperties: false
      required:
        - fcm_push_token
      properties:
        fcm_push_token:
          type: string
          minLength: 1
          example: fcm:APA91b...

    FcmPushTokenUpdateResult:
      type: object
      additionalProperties: false
      required:
        - registered_at
      properties:
        registered_at:
          type: string
          format: date-time

    FcmPushTokenUpdateResponse:
      type: object
      additionalProperties: false
      required:
        - fcm_push_token
      properties:
        fcm_push_token:
          $ref: "#/components/schemas/FcmPushTokenUpdateResult"

    InstallAction:
      type: string
      enum:
        - INSTALL
        - UNINSTALL

    InstallMode:
      type: string
      enum:
        - FORCE_INSTALLED
        - AVAILABLE

    InstallResult:
      type: string
      enum:
        - INSTALLED
        - UNINSTALLED
        - FAILED
        - SKIPPED

    InstallRoute:
      type: string
      description: |
        Install path actually used by the companion app. `AMAPI_CUSTOM_APP`
        means the AMAPI SDK custom app install path (requires fully managed
        device + COMPANION_APP role + target APK declared with installType=CUSTOM
        and matching signingKeyCerts). `PACKAGE_INSTALLER` means the standard
        Android PackageInstaller path with user confirmation.
      enum:
        - AMAPI_CUSTOM_APP
        - PACKAGE_INSTALLER

    Notification:
      type: object
      additionalProperties: false
      description: |
        A sticky notification that the device should currently show. Backs both
        the OS notification tray entry and the in-app inbox row. Resolved
        notifications are removed server-side and disappear from subsequent
        `GET /api/notifications` responses; there is no user-side dismiss.
      required:
        - id
        - kind
        - title
        - body
        - created_at
      properties:
        id:
          type: integer
          minimum: 1
        kind:
          $ref: "#/components/schemas/NotificationKind"
        title:
          type: string
          description: Display title. The companion app shows this verbatim in both the OS notification and the in-app inbox row.
          example: 勤怠アプリ をインストールしてください
        body:
          type: string
          description: One-line explanation of what the user is being asked to do.
          example: 必須アプリのインストール許可が必要です。
        app:
          description: |
            Optional reference to the policy app this notification is about.
            Present whenever the notification is anchored to a specific app
            (install permission required, download retry available, etc.); absent
            for device-level notifications.
          $ref: "#/components/schemas/DevicePolicyAppRef"
        created_at:
          type: string
          format: date-time
          description: |
            When the notification first became active. Stable across re-fetches
            so the inbox can sort by creation time. If a condition disappears and
            later reappears, the server issues a new notification row with a new
            `id` and `created_at`.

    NotificationKind:
      type: string
      description: |
        Machine-readable category of the notification. The companion app uses
        this to choose the OS notification channel and the deep-link target, but
        all rendering text comes from `title` / `body`.

        - `INSTALL_PERMISSION_REQUIRED`: a FORCE_INSTALLED app needs
          PACKAGE_INSTALLER confirmation that has not been granted yet.
        - `DOWNLOAD_RETRY_AVAILABLE`: a recoverable download failure is
          outstanding and a user-driven retry can move it forward.
      enum:
        - INSTALL_PERMISSION_REQUIRED
        - DOWNLOAD_RETRY_AVAILABLE

    NotificationListResponse:
      type: object
      additionalProperties: false
      required:
        - notifications
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"

    PolicySyncAction:
      type: object
      additionalProperties: false
      description: |
        Per-app outcome reported from the companion app at the end of a sync
        attempt. Includes successes (INSTALLED / UNINSTALLED / SKIPPED) and
        unrecoverable failures (FAILED). Recoverable failures are not reported;
        the device retries them locally instead. When `result` is FAILED, `phase`
        and `code` describe where and why the entry was given up on.
      required:
        - package_name
        - action
        - route
        - result
      properties:
        package_name:
          type: string
          example: com.example.appa
        action:
          $ref: "#/components/schemas/InstallAction"
        route:
          $ref: "#/components/schemas/InstallRoute"
        result:
          $ref: "#/components/schemas/InstallResult"
        phase:
          description: |
            Required when `result` is FAILED. Indicates which phase the entry
            failed in.
          $ref: "#/components/schemas/PolicySyncFailurePhase"
        code:
          type: string
          description: |
            Machine-readable failure code in SCREAMING_SNAKE_CASE. Required when
            `result` is FAILED. Documented codes include ARTIFACT_GONE,
            ARTIFACT_CORRUPTED (phase=DOWNLOAD); SIGNATURE_MISMATCH,
            INCOMPATIBLE_OS, USER_DECLINED (phase=INSTALL).
          example: SIGNATURE_MISMATCH

    PolicySyncFailurePhase:
      type: string
      enum:
        - DOWNLOAD
        - INSTALL

    PolicySyncResult:
      type: object
      additionalProperties: false
      required:
        - id
        - device_policy_revision
        - fetched_policy_updated_at
        - applied_policy_updated_at
        - reported_at
        - actions
      properties:
        id:
          type: integer
          minimum: 1
        device_policy_revision:
          $ref: "#/components/schemas/DevicePolicyRevisionReference"
        fetched_policy_updated_at:
          type: string
          format: date-time
        applied_policy_updated_at:
          type: string
          format: date-time
        reported_at:
          type: string
          format: date-time
        actions:
          type: array
          items:
            $ref: "#/components/schemas/PolicySyncAction"

    PolicySyncResultCreateRequest:
      type: object
      additionalProperties: false
      required:
        - device_policy_revision
        - fetched_policy_updated_at
        - applied_policy_updated_at
        - actions
      properties:
        device_policy_revision:
          $ref: "#/components/schemas/DevicePolicyRevisionReference"
        fetched_policy_updated_at:
          type: string
          format: date-time
        applied_policy_updated_at:
          type: string
          format: date-time
        actions:
          type: array
          items:
            $ref: "#/components/schemas/PolicySyncAction"

    PolicySyncResultDetailResponse:
      type: object
      additionalProperties: false
      required:
        - policy_sync_result
      properties:
        policy_sync_result:
          $ref: "#/components/schemas/PolicySyncResult"

    ReleaseArtifactUrl:
      type: object
      additionalProperties: false
      required:
        - release
        - artifact_url
        - expires_at
      properties:
        release:
          $ref: "#/components/schemas/ReleaseReference"
        artifact_url:
          type: string
          format: uri
          description: Short-lived (presigned) download URL for the APK artifact. Initial TTL target is 15 minutes.
        expires_at:
          type: string
          format: date-time

    ReleaseArtifactUrlDetailResponse:
      type: object
      additionalProperties: false
      required:
        - release_artifact_url
      properties:
        release_artifact_url:
          $ref: "#/components/schemas/ReleaseArtifactUrl"

    ReleaseReference:
      type: object
      additionalProperties: false
      required:
        - id
      properties:
        id:
          type: integer
          minimum: 1
