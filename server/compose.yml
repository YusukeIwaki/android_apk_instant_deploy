services:
  server:
    build:
      context: .
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_REGION: us-east-1
      AWS_SECRET_ACCESS_KEY: test
      ADMIN_TOKEN: dev-admin-token
      DATABASE_HOST: mysql
      DATABASE_NAME: apk_instant_deploy
      DATABASE_PASSWORD: apk
      DATABASE_PORT: "3306"
      DATABASE_SSL_CA: /mysql-certs/ca.pem
      DATABASE_USERNAME: apk
      FCM_SERVICE_ACCOUNT_JSON: /app/config/firebase-service-account.json
      RACK_ENV: development
      S3_BUCKET: apk-artifacts
      S3_DOWNLOAD_URL_EXPIRES_IN: "900"
      S3_ENDPOINT: http://floci:4566
      S3_FORCE_PATH_STYLE: "true"
      S3_UPLOAD_URL_EXPIRES_IN: "900"
      SQL_LOG: "true"
      TOKEN_ENCRYPTION_SECRET: local-token-encryption-secret
      TOKEN_HMAC_SECRET: local-token-hmac-secret
      VERBOSE_QUERY_LOGS: "true"
    ports:
      - "4567:4567"
    depends_on:
      mysql:
        condition: service_healthy
      floci:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    volumes:
      - mysql-certs:/mysql-certs:ro
      - .:/app

  migrate:
    build:
      context: .
    command:
      - bundle
      - exec
      - ridgepole
      - --config
      - config/database.yml
      - --env
      - development
      - --file
      - db/Schemafile
      - --apply
    environment:
      DATABASE_HOST: mysql
      DATABASE_NAME: apk_instant_deploy
      DATABASE_PASSWORD: apk
      DATABASE_PORT: "3306"
      DATABASE_SSL_CA: /mysql-certs/ca.pem
      DATABASE_USERNAME: apk
      RACK_ENV: development
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - mysql-certs:/mysql-certs:ro
      - .:/app
    profiles:
      - tools

  mysql:
    image: mysql:8.4
    entrypoint:
      - /bin/sh
      - /usr/local/bin/apk-mysql-entrypoint.sh
    environment:
      MYSQL_DATABASE: apk_instant_deploy
      MYSQL_PASSWORD: apk
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: apk
    volumes:
      - ./docker/mysql-entrypoint.sh:/usr/local/bin/apk-mysql-entrypoint.sh:ro
      - ./docker/mysql-init-test-db.sql:/docker-entrypoint-initdb.d/01-create-test-db.sql:ro
      - mysql-certs:/etc/mysql/certs
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uapk -papk --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  floci:
    image: floci/floci:latest
    environment:
      FLOCI_HOSTNAME: floci
      FLOCI_STORAGE_MODE: hybrid
      FLOCI_STORAGE_PERSISTENT_PATH: /app/data
    volumes:
      - floci-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4566/_localstack/health >/dev/null || curl -fsS http://localhost:4566/_localstack/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  playwright:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    command:
      - /bin/sh
      - -c
      - npx -y playwright@1.60.0 run-server --host 0.0.0.0 --port 8888
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8888 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    profiles:
      - test

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      ADMIN_TOKEN: dev-admin-token
      BROWSER: chromium
      DATABASE_HOST: mysql
      DATABASE_NAME: apk_instant_deploy_test
      DATABASE_PASSWORD: apk
      DATABASE_PORT: "3306"
      DATABASE_SSL_CA: /mysql-certs/ca.pem
      DATABASE_USERNAME: apk
      HEADLESS: "true"
      OBJECT_STORE: local
      LOCAL_ARTIFACT_DIR: /tmp/artifacts
      PLAYWRIGHT_WS_ENDPOINT: ws://playwright:8888/
      RACK_ENV: test
      SMARTEST_RAILS_TEST_SERVER_HOST: 0.0.0.0
      SMARTEST_RAILS_TEST_SERVER_PORT: "4001"
      SMARTEST_RAILS_BASE_URL: http://test:4001
      TOKEN_ENCRYPTION_SECRET: test-token-encryption-secret
      TOKEN_HMAC_SECRET: test-token-hmac-secret
    depends_on:
      mysql:
        condition: service_healthy
      playwright:
        condition: service_started
      test-migrate:
        condition: service_completed_successfully
    volumes:
      - mysql-certs:/mysql-certs:ro
      - .:/app
    profiles:
      - test

  test-migrate:
    build:
      context: .
      dockerfile: Dockerfile.test
    command:
      - bundle
      - exec
      - ridgepole
      - --config
      - config/database.yml
      - --env
      - test
      - --file
      - db/Schemafile
      - --apply
    environment:
      DATABASE_HOST: mysql
      DATABASE_NAME: apk_instant_deploy_test
      DATABASE_PASSWORD: apk
      DATABASE_PORT: "3306"
      DATABASE_SSL_CA: /mysql-certs/ca.pem
      DATABASE_USERNAME: apk
      RACK_ENV: test
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - mysql-certs:/mysql-certs:ro
      - .:/app
    profiles:
      - test

  create-bucket:
    image: amazon/aws-cli:latest
    depends_on:
      floci:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_SECRET_ACCESS_KEY: test
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        aws --endpoint-url=http://floci:4566 s3api create-bucket --bucket apk-artifacts || true

volumes:
  floci-data:
  mysql-certs:
  mysql-data:
